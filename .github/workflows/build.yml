name: Build
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-non-impacting-changes:
    uses: ./.github/workflows/detect-non-impacting-changes.yml
    permissions:
      contents: read
      pull-requests: read

  build:
    needs: detect-non-impacting-changes
    runs-on: macos-15-xlarge
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ios
            command: set -o pipefail && xcrun xcodebuild clean build -scheme PostHog -destination generic/platform=ios | xcpretty
          - platform: macos-spm
            command: set -o pipefail && xcrun swift build --arch arm64
          - platform: macos
            command: set -o pipefail && xcrun xcodebuild clean build -scheme PostHog -destination generic/platform=macos | xcpretty
          - platform: tvos
            command: set -o pipefail && xcrun xcodebuild clean build -scheme PostHog -destination generic/platform=tvos | xcpretty
          - platform: watchos
            command: set -o pipefail && xcrun xcodebuild clean build -scheme PostHog -destination generic/platform=watchos | xcpretty
          - platform: visionos
            command: set -o pipefail && xcrun xcodebuild clean build -scheme PostHog -destination generic/platform=xros | xcpretty
    name: Build SDK (${{ matrix.platform }})
    steps:
      - name: Complete non-impacting PR check
        if: needs.detect-non-impacting-changes.outputs.skip_heavy == 'true'
        run: echo "Only non-impacting files changed; no additional work is required for this check."
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.detect-non-impacting-changes.outputs.skip_heavy != 'true'
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        if: needs.detect-non-impacting-changes.outputs.skip_heavy != 'true'
        with:
          xcode-version: latest-stable
      - name: Build SDK (${{ matrix.platform }})
        if: needs.detect-non-impacting-changes.outputs.skip_heavy != 'true'
        run: ${{ matrix.command }}

  public-api:
    needs: detect-non-impacting-changes
    if: github.event_name == 'pull_request' && needs.detect-non-impacting-changes.outputs.skip_heavy != 'true'
    runs-on: macos-15
    name: Public API snapshot
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable
      - name: Check public API snapshot
        run: make apiCheck

  build-sdk-swift53-compat:
    needs: detect-non-impacting-changes
    runs-on: macos-14-xlarge
    name: Build SDK (Swift 5 compatibility on Xcode 15.4 with CocoaPods)
    steps:
      - name: Complete non-impacting PR check
        if: needs.detect-non-impacting-changes.outputs.skip_heavy == 'true'
        run: echo "Only non-impacting files changed; no additional work is required for this check."
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.detect-non-impacting-changes.outputs.skip_heavy != 'true'
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        if: needs.detect-non-impacting-changes.outputs.skip_heavy != 'true'
        with:
          xcode-version: '15.4'
      - name: Print toolchain versions
        if: needs.detect-non-impacting-changes.outputs.skip_heavy != 'true'
        run: |
          xcodebuild -version
          xcrun swift --version
      - name: Install CocoaPods
        if: needs.detect-non-impacting-changes.outputs.skip_heavy != 'true'
        run: gem install cocoapods
      - name: Install Pods
        if: needs.detect-non-impacting-changes.outputs.skip_heavy != 'true'
        run: |
          cd PostHogExampleWithPods
          USE_FRAMEWORKS=static pod install
      - name: Build SDK with Swift 5 language mode via CocoaPods
        if: needs.detect-non-impacting-changes.outputs.skip_heavy != 'true'
        run: |
          set -o pipefail
          cd PostHogExampleWithPods
          xcrun xcodebuild clean build \
            -workspace PostHogExampleWithPods.xcworkspace \
            -scheme PostHogExampleWithPods \
            -destination generic/platform=ios \
            SWIFT_VERSION=5 | xcpretty

  podspec-lint:
    needs: detect-non-impacting-changes
    if: needs.detect-non-impacting-changes.outputs.skip_heavy != 'true'
    runs-on: macos-15
    name: CocoaPods package lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable
      - name: Install CocoaPods
        run: gem install cocoapods
      - name: Lint podspec
        run: pod lib lint PostHog.podspec --allow-warnings --skip-tests
