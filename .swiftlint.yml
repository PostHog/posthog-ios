excluded: # case-sensitive paths to ignore during linting. Takes precedence over `included`
  - PostHogExample
  - PostHogExampleAutocapture
  - PostHogExampleExternalSDK
  - PostHogExampleMacOS
  - PostHogExampleStoryboard
  - PostHogExampleTvOS
  - PostHogExampleVisionOS
  - PostHogExampleWatchOS
  - PostHogExampleWidget
  - PostHogExampleWidgetAppGroup
  - PostHogExampleWithPods
  - PostHogExampleWithSPM
  - PostHogTests
  - PostHog/Utils/ReadWriteLock.swift
  - PostHog/Utils/Reachability.swift
  - PostHog/Utils/Data+Gzip.swift
  - .build
  - Pods

disabled_rules:
  - force_cast
  - todo
  - trailing_comma
  - opening_brace

opt_in_rules:
  - missing_docs

missing_docs:
  # the defaults skip members of any type that subclasses or conforms to anything
  # (i.e. nearly the whole SDK), which would make the rule a no-op
  excludes_inherited_types: false
  excludes_extensions: false

line_length:
  warning: 160
  ignores_comments: true
  excluded_lines_patterns: [
    # long deprecation messages
    \@available(.*/*deprecated.*) 
  ]

file_length:
  warning: 1000
  error: 1200

identifier_name:
  excluded:
    - id
    - ^ph_.*$

function_body_length:
  - 1000 # warning
  - 1200 # error

type_body_length:
  - 1000 # warning
  - 1200 # error
